name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /eye-vision-v1.0.7/v1.0.7/
      VITE_STORAGE_BACKEND: supabase
      VITE_AGENT_API_URL: https://eye-vision-agent-api.onrender.com/api/agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Organizar pastas para GitHub Pages (/eye-vision-v1.0.7/v1.0.7/)
        run: |
          VERSION_PATH=eye-vision-v1.0.7/v1.0.7
          mkdir -p "dist/$VERSION_PATH"
          for item in index.html assets data _redirects; do
            if [ -e "dist/$item" ]; then mv "dist/$item" "dist/$VERSION_PATH/"; fi
          done
          cp "dist/$VERSION_PATH/index.html" "dist/$VERSION_PATH/404.html"
          mkdir -p dist/eye-vision-v1.0.7
          printf '%s\n' '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=v1.0.7/"><title>Eye Vision v1.0.7</title></head><body><p><a href="v1.0.7/">Eye Vision v1.0.7</a></p></body></html>' > dist/eye-vision-v1.0.7/index.html
          printf '%s\n' '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=eye-vision-v1.0.7/v1.0.7/"><title>Eye Vision</title></head><body><p><a href="eye-vision-v1.0.7/v1.0.7/">Eye Vision v1.0.7</a></p></body></html>' > dist/index.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: false
